repos:
  - repo: local
    hooks:
      - id: gofumpt
        name: gofumpt
        entry: gofumpt -l -w
        language: system
        types: [go]

      - id: goimports-reviser
        name: goimports-reviser
        entry: goimports-reviser -recursive -company-prefixes "atbuy/noteui" ./...
        language: system
        pass_filenames: false
        types: [go]

      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run --config .golangci.yml ./...
        language: system
        pass_filenames: false
        types: [go]
