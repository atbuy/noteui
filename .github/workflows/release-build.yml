name: Release builds

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: windows
            goarch: arm64
            ext: ".exe"

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go 1.26
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          BIN_NAME="noteui-${{ github.event.release.tag_name }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          OUT="dist/${BIN_NAME}${{ matrix.ext }}"
          go build -trimpath -ldflags="-s -w" -o "$OUT" ./cmd/noteui

      - name: Package archive
        run: |
          cd dist
          BIN_NAME="noteui-${{ github.event.release.tag_name }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          FILE="${BIN_NAME}${{ matrix.ext }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${BIN_NAME}.zip" "$FILE"
          else
            tar -czf "${BIN_NAME}.tar.gz" "$FILE"
          fi

      - name: Upload release asset
        if: ${{ !env.ACT }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd dist
          if [ "${{ matrix.goos }}" = "windows" ]; then
            gh release upload "${{ github.event.release.tag_name }}" \
              "noteui-${{ github.event.release.tag_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.zip" \
              --clobber
          else
            gh release upload "${{ github.event.release.tag_name }}" \
              "noteui-${{ github.event.release.tag_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" \
              --clobber
          fi
