name: Release builds

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.event.release.tag_name }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: windows
            goarch: arm64
            ext: ".exe"

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go 1.26.1
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache: true

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          ARCHIVE_BASENAME="noteui-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"
          NOTEUI_NAME="${ARCHIVE_BASENAME}${{ matrix.ext }}"
          SYNC_NAME="noteui-sync-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          go build -trimpath \
            -ldflags="-s -w -X atbuy/noteui/internal/buildinfo.Version=${VERSION}" \
            -o "dist/${NOTEUI_NAME}" ./cmd/noteui
          go build -trimpath \
            -ldflags="-s -w -X atbuy/noteui/internal/buildinfo.Version=${VERSION}" \
            -o "dist/${SYNC_NAME}" ./cmd/noteui-sync

      - name: Package archive
        run: |
          cd dist
          ARCHIVE_BASENAME="noteui-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"
          NOTEUI_NAME="${ARCHIVE_BASENAME}${{ matrix.ext }}"
          SYNC_NAME="noteui-sync-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${ARCHIVE_BASENAME}.zip" "$NOTEUI_NAME" "$SYNC_NAME"
          else
            tar -czf "${ARCHIVE_BASENAME}.tar.gz" "$NOTEUI_NAME" "$SYNC_NAME"
          fi

      - name: Upload release asset
        if: ${{ !env.ACT }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd dist
          ARCHIVE_BASENAME="noteui-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            gh release upload "${VERSION}" \
              "${ARCHIVE_BASENAME}.zip" \
              --clobber
          else
            gh release upload "${VERSION}" \
              "${ARCHIVE_BASENAME}.tar.gz" \
              --clobber
          fi
