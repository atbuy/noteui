name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Cache contributor tools
        id: contributor-tools-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/bin
            ~/.cache/uv
            ~/.local/bin
            ~/.local/share/uv/tools
          key: ${{ runner.os }}-contributor-tools-${{ hashFiles('Makefile', '.golangci.yml', '.pre-commit-config.yaml', '.github/workflows/ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-contributor-tools-

      - name: Install contributor tools
        if: steps.contributor-tools-cache.outputs.cache-hit != 'true'
        run: make tools

      - name: Run linters
        run: make lint

      - name: Run race tests
        run: go test -race ./...

      - name: Run unit tests with coverage
        run: go test -coverprofile=coverage.out ./...

      - name: Summarize coverage
        run: |
          echo '### Coverage' >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          go tool cover -func=coverage.out | tail -n 1 >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Verify build
        run: go build -buildvcs=false ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: atbuy/noteui
          files: coverage.out
          fail_ci_if_error: false
          verbose: true

  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-docs-pip-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-docs-pip-

      - name: Install Zensical
        run: pip install zensical

      - name: Build docs
        run: zensical build --clean
