[project]
site_name = "noteui"
site_url = "https://atbuy.github.io/noteui/"
repo_url = "https://github.com/atbuy/noteui"
repo_name = "atbuy/noteui"
docs_dir = "docs"
site_dir = "site"
nav = [
  {"Home" = "index.md"},
  {"Tutorial" = [
    "tutorial/getting-started.md",
    "tutorial/installation.md",
    "tutorial/first-notes.md"
  ]},
  {"Guide" = [
    "guide/usage.md",
    "guide/keybindings.md"
  ]},
  {"Advanced" = [
    "advanced/encryption.md",
    "advanced/power-user-workflows.md"
  ]},
  {"Reference" = [
    "reference/configuration.md",
    "reference/environment.md",
    "reference/storage-and-state.md"
  ]},
  {"FAQ" = "faq.md"}
]

[project.theme]
variant = "modern"
features = [
  "content.code.copy",
  "content.tabs.link",
  "content.tooltips",
  "content.footnote.tooltips",
  "navigation.instant",
  "navigation.tracking",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.sections",
  "navigation.expand",
  "navigation.path",
  "search.highlight",
  "search.suggest",
  "content.action.edit",
  "content.action.view"
]

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

[project.theme.icon]
repo = "fontawesome/brands/github"

[project.theme.icon.admonition]
note = "octicons/tag-16"
tip = "octicons/light-bulb-16"
warning = "octicons/alert-16"
info = "octicons/info-16"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "teal"
accent = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "teal"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to light mode"

[project.markdown_extensions.toc]
permalink = true
title = "On this page"

[project.markdown_extensions.admonition]
[project.markdown_extensions.abbr]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
smart_enable = "all"
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
